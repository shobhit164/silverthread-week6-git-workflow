<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Silverthread Storefront Mock</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="storefront">
      <section class="promo-banner" aria-label="Store promotion">
        <p>Welcome to Silverthread Market.</p>
      </section>

      <section class="product-grid" aria-label="Featured products">
        <article class="product-card">
          <div class="product-image" aria-hidden="true">ST</div>
          <div class="product-details">
            <p class="category">Everyday Essentials</p>
            <h1>Canvas Travel Tote</h1>
            <p class="description">A lightweight tote for campus, work, and weekend errands.</p>
            <div class="purchase-row">
              <p class="price">$42.00</p>
              <p class="inventory">Only 8 left</p>
            </div>
            <button class="checkout-button" type="button">Checkout</button>
          </div>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
